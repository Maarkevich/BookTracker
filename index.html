<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1117">
  <meta name="description" content="Оффлайн PWA Book Tracker для личной библиотеки">
  <title>Book Tracker PWA</title>
  <style>
    :root{--bg:#0f1117;--card:#1a1d25;--card2:#222633;--text:#f7fafc;--muted:#9aa0a6;--blue:#4da6ff;--orange:#ff7a00;--green:#3ddc84;--line:rgba(255,255,255,.1);--shadow:0 20px 60px rgba(0,0,0,.35)}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at top left,rgba(77,166,255,.18),transparent 30rem),radial-gradient(circle at bottom right,rgba(255,122,0,.16),transparent 28rem),var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color-scheme:dark}button,input,textarea,select{font:inherit}button{cursor:pointer}img{max-width:100%}.app{width:min(100%,1120px);margin:0 auto;padding:18px 16px 96px}.top{position:sticky;top:0;z-index:20;display:grid;grid-template-columns:48px 1fr 48px;gap:12px;align-items:center;padding:12px 0 18px;backdrop-filter:blur(18px)}.eyebrow{color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.12em}.top h1,h2{margin:2px 0 0;line-height:1.08}.icon,.add{width:46px;height:46px;border:1px solid var(--line);border-radius:16px;background:rgba(26,29,37,.84);color:var(--text);display:grid;place-items:center;box-shadow:0 10px 24px rgba(0,0,0,.18)}.add{border:0;background:linear-gradient(135deg,var(--blue),var(--orange));font-size:1.55rem;font-weight:900}.icon:active,.add:active,.primary:active,.secondary:active,.danger:active,.book:active{transform:scale(.96)}.drawer-bg{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:.2s}.drawer-bg.show{opacity:1;pointer-events:auto}.drawer{position:fixed;inset:0 auto 0 0;z-index:50;width:min(86vw,340px);padding:20px;background:rgba(15,17,23,.97);border-right:1px solid var(--line);box-shadow:var(--shadow);transform:translateX(-105%);transition:transform .26s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column}.drawer.open{transform:translateX(0)}.brand{display:flex;align-items:center;gap:12px;margin-bottom:26px}.mark{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--blue),var(--orange));display:grid;place-items:center;font-weight:900}.brand span,.drawer small,.muted,p{color:var(--muted)}nav{display:grid;gap:8px}nav button{display:flex;align-items:center;gap:12px;width:100%;border:1px solid transparent;border-radius:16px;padding:13px 14px;background:transparent;color:var(--text);text-align:left}nav button.active,nav button:hover{background:rgba(77,166,255,.12);border-color:rgba(77,166,255,.32)}.drawer-foot{margin-top:auto;padding:14px;border:1px solid var(--line);border-radius:18px;background:var(--card);display:grid;gap:4px}.panel,.empty,.settings,.insight{border:1px solid var(--line);border-radius:24px;background:linear-gradient(180deg,rgba(26,29,37,.96),rgba(26,29,37,.72));box-shadow:var(--shadow);animation:rise .42s ease both}.onboarding,.empty{min-height:62vh;display:grid;align-content:center;gap:18px;padding:28px}.onboarding h2{font-size:clamp(2rem,10vw,4.6rem);letter-spacing:-.06em}.onboarding p,.empty p{max-width:620px;line-height:1.65}.pill{width:fit-content;display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(77,166,255,.35);border-radius:999px;padding:7px 10px;color:var(--blue);background:rgba(77,166,255,.1);font-size:.82rem;font-weight:800}.primary,.secondary,.danger,.choice button,.seg button,.stat button{border:0;border-radius:16px;padding:13px 16px;font-weight:850;transition:.18s}.primary{background:linear-gradient(135deg,var(--blue),#2e7ee8);color:#fff;box-shadow:0 12px 26px rgba(77,166,255,.25)}.secondary,.choice button{border:1px solid var(--line);background:var(--card2);color:var(--text)}.danger{border:1px solid rgba(255,89,89,.32);background:rgba(255,89,89,.14);color:#ff7777}.actions,.choice,.manual{display:flex;gap:10px;flex-wrap:wrap}.controls{display:grid;gap:10px;margin:4px 0 18px}.search{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:18px;padding:0 14px;background:rgba(26,29,37,.84)}.search input,.controls select,input,textarea,select{width:100%;border:1px solid var(--line);border-radius:15px;padding:13px 14px;background:rgba(255,255,255,.045);color:var(--text);outline:none}.search input{border:0;background:transparent;padding-inline:0}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.book{min-width:0;border:1px solid var(--line);border-radius:22px;overflow:hidden;background:var(--card);color:var(--text);padding:0;text-align:left;box-shadow:0 14px 30px rgba(0,0,0,.18);animation:cardIn .42s ease both;transition:.18s}.book:hover{transform:translateY(-3px) scale(1.015);border-color:rgba(77,166,255,.35);box-shadow:0 24px 42px rgba(0,0,0,.28)}.cover{aspect-ratio:.78;min-height:188px;display:grid;place-items:center;overflow:hidden;position:relative}.cover img,.bigcover img{width:100%;height:100%;object-fit:cover}.cover span,.bigcover span{z-index:1;font-size:2.4rem;font-weight:900;letter-spacing:-.08em}.meta{min-height:118px;display:grid;gap:6px;padding:14px}.meta strong{line-height:1.12;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.meta span{font-size:.9rem;white-space:nowrap;text-overflow:ellipsis;overflow:hidden;color:var(--muted)}.bottom{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:4px}.bottom i{font-style:normal;font-size:.78rem;font-weight:800}.bottom b{color:#ffb74d;font-size:.82rem}.empty{text-align:center;place-items:center}.empty-icon{font-size:4rem}.overlay{position:fixed;inset:0;z-index:60;display:grid;place-items:center;padding:16px;background:rgba(0,0,0,.58);backdrop-filter:blur(10px);animation:fade .18s ease both}.overlay.end{align-items:end}.sheet,.modal{width:min(100%,760px);max-height:92vh;overflow:auto;border:1px solid var(--line);border-radius:28px 28px 18px 18px;background:rgba(26,29,37,.98);box-shadow:var(--shadow);padding:18px;animation:sheet .26s cubic-bezier(.2,.8,.2,1) both}.modal{border-radius:24px}.compact{max-width:430px}.head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:16px}.form{display:grid;gap:12px;margin-top:14px}.form label,.settings label{display:grid;gap:7px;color:var(--muted);font-size:.88rem;font-weight:800}textarea{resize:vertical}.sticky{position:sticky;bottom:-18px;margin:18px -18px -18px;padding:14px 18px 18px;background:linear-gradient(180deg,rgba(26,29,37,.78),#1a1d25 40%)}.result{margin-top:14px;display:grid;gap:4px;border:1px solid rgba(61,220,132,.28);border-radius:18px;padding:14px;background:rgba(61,220,132,.08)}.result span{color:var(--green);font-size:.78rem;font-weight:900;text-transform:uppercase;letter-spacing:.08em}.detail{text-align:center}.bigcover{position:relative;width:min(72vw,260px);aspect-ratio:.72;margin:0 auto 18px;display:grid;place-items:center;overflow:hidden;border-radius:24px;box-shadow:0 24px 44px rgba(0,0,0,.38)}.detail h2{font-size:2rem;letter-spacing:-.04em}.desc{line-height:1.6;text-align:left;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:18px;padding:14px}.quick{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0}.quick button{min-height:54px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.04);font-size:1.45rem}.quick button.active{background:rgba(77,166,255,.14)}.stars{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin-bottom:18px}.stars button{border:0;background:transparent;color:rgba(255,255,255,.25);font-size:1.05rem;padding:4px 0}.stars button.fill{color:#ffb74d}.stats{display:grid;gap:14px}.stat{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.stat button{min-height:128px;display:grid;place-items:center;border:1px solid var(--line);background:linear-gradient(180deg,var(--card),rgba(34,38,51,.74));color:var(--text)}.stat span,.insight h2{font-size:2.8rem;font-weight:900;letter-spacing:-.08em;color:var(--blue)}.stat small{color:var(--muted);font-weight:850}.insight,.settings{padding:18px}.settings{display:grid;gap:16px}.toggle{grid-template-columns:1fr auto!important;align-items:center;border:1px solid var(--line);border-radius:18px;padding:14px;background:rgba(255,255,255,.035)}.toggle input{width:48px;height:26px;accent-color:var(--blue)}.seg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:18px 0;padding:4px;border-radius:18px;background:rgba(255,255,255,.05)}.seg button{color:var(--muted);background:transparent}.seg button.active{color:var(--text);background:var(--card2)}.scanner video{width:100%;min-height:240px;object-fit:cover;border-radius:20px;border:1px solid var(--line);background:#05070a}.manual{margin-top:12px}.manual input{flex:1 1 180px}.toast{position:fixed;z-index:90;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translateX(-50%);width:min(calc(100% - 32px),440px);border:1px solid rgba(77,166,255,.34);border-radius:18px;padding:14px 16px;background:rgba(15,17,23,.94);box-shadow:var(--shadow);color:var(--text);text-align:center;animation:toast .26s ease both}.confetti{position:fixed;inset:0;z-index:80;pointer-events:none}.hidden{display:none}@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}@keyframes sheet{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}@keyframes fade{from{opacity:0}to{opacity:1}}@keyframes toast{from{opacity:0;transform:translate(-50%,18px)}to{opacity:1;transform:translate(-50%,0)}}@media(min-width:680px){.app{padding-inline:28px}.controls{grid-template-columns:1fr 220px}.grid{grid-template-columns:repeat(3,minmax(0,1fr))}.form{grid-template-columns:repeat(2,1fr)}.wide{grid-column:1/-1}.stat{grid-template-columns:repeat(4,1fr)}}@media(min-width:980px){.grid{grid-template-columns:repeat(4,minmax(0,1fr))}}
  </style>
</head>
<body>
  <main class="app">
    <canvas id="confetti" class="confetti"></canvas>
    <div id="drawerBg" class="drawer-bg"></div>
    <aside id="drawer" class="drawer"></aside>
    <header class="top"><button id="openDrawer" class="icon">☰</button><div><span class="eyebrow">Личная библиотека</span><h1 id="title">Вся библиотека</h1></div><button id="addBtn" class="add">+</button></header>
    <section id="root"></section>
  </main>
  <script>
    const DB_NAME='book-tracker-pwa',DB_VERSION=1,BOOK_STORE='books',SETTINGS_STORE='settings';
    const statusMap={unread:{label:'Не прочитано',icon:'💤',color:'#9aa0a6',short:'Спит'},reading:{label:'Читаю',icon:'📖',color:'#4da6ff',short:'В процессе'},completed:{label:'Прочитано',icon:'✅',color:'#3ddc84',short:'Готово'},wishlist:{label:'Wishlist',icon:'⭐',color:'#ffb74d',short:'Хочу'}};
    const menu=[['all','📚','Вся библиотека'],['reading','📖','Читаю'],['unread','💤','Не прочитано'],['completed','✅','Прочитано'],['wishlist','⭐','Wishlist'],['stats','📊','Статистика'],['settings','⚙️','Настройки']];
    const samples={'9785171183664':{title:'Мастер и Маргарита',author:'Михаил Булгаков',genre:'Роман',description:'Мистический роман о свободе, любви и силе воображения.',rating:10},'9785389087580':{title:'1984',author:'Джордж Оруэлл',genre:'Антиутопия',description:'История о контроле, языке и личной свободе.',rating:9},'9780140449136':{title:'The Odyssey',author:'Homer',genre:'Классика',description:'Эпическое путешествие домой через испытания и мифы.',rating:8}};
    const empty={title:'',author:'',cover:'',status:'unread',rating:7,description:'',genre:'',purchaseDate:''};
    let books=[],settings={username:'Читатель',soundEnabled:true,vibrationEnabled:true},view='all',search='',filter='all',selected=null,editing=null,form={...empty},lastAdded=null,pendingImport=null,importMode='merge',stream=null,scanTimer=null;
    const root=document.getElementById('root'),drawer=document.getElementById('drawer'),drawerBg=document.getElementById('drawerBg'),title=document.getElementById('title'),confetti=document.getElementById('confetti');
    function db(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VERSION);r.onupgradeneeded=()=>{const d=r.result;if(!d.objectStoreNames.contains(BOOK_STORE)){const s=d.createObjectStore(BOOK_STORE,{keyPath:'id'});s.createIndex('status','status');s.createIndex('updatedAt','updatedAt')}if(!d.objectStoreNames.contains(SETTINGS_STORE))d.createObjectStore(SETTINGS_STORE,{keyPath:'id'})};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
    async function store(name,mode,fn){const d=await db();return new Promise((res,rej)=>{const tx=d.transaction(name,mode),s=tx.objectStore(name),rq=fn(s);let out;if(rq){rq.onsuccess=()=>out=rq.result;rq.onerror=()=>rej(rq.error)}tx.oncomplete=()=>{d.close();res(out)};tx.onerror=()=>{d.close();rej(tx.error)}})}
    const uid=()=>crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random().toString(16).slice(2);
    const esc=s=>String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    const norm=b=>{const now=new Date().toISOString();return{id:b.id||uid(),title:String(b.title||'Без названия').trim(),author:String(b.author||'Неизвестный автор').trim(),cover:String(b.cover||''),status:b.status||'unread',rating:Math.max(1,Math.min(10,Number(b.rating)||1)),description:String(b.description||''),genre:String(b.genre||''),purchaseDate:String(b.purchaseDate||''),finishedDate:String(b.finishedDate||''),createdAt:b.createdAt||now,updatedAt:now}};
    async function load(){books=(await store(BOOK_STORE,'readonly',s=>s.getAll())||[]).sort((a,b)=>b.updatedAt.localeCompare(a.updatedAt));const rec=await store(SETTINGS_STORE,'readonly',s=>s.get('settings'));settings=rec?.value||settings;render()}
    async function saveBookObj(book){await store(BOOK_STORE,'readwrite',s=>s.put(book));books=[book,...books.filter(x=>x.id!==book.id)].sort((a,b)=>b.updatedAt.localeCompare(a.updatedAt));localStorage.setItem('book-tracker-onboarded','true')}
    async function delBook(id){await store(BOOK_STORE,'readwrite',s=>s.delete(id));books=books.filter(b=>b.id!==id)}
    async function saveSettings(){await store(SETTINGS_STORE,'readwrite',s=>s.put({id:'settings',value:settings}))}
    async function replaceBooks(list){const d=await db();await new Promise((res,rej)=>{const tx=d.transaction(BOOK_STORE,'readwrite'),s=tx.objectStore(BOOK_STORE);s.clear();list.forEach(b=>s.put(b));tx.oncomplete=()=>{d.close();res()};tx.onerror=()=>{d.close();rej(tx.error)}});books=list.sort((a,b)=>b.updatedAt.localeCompare(a.updatedAt))}
    function cover(t){const p=['#4da6ff','#ff7a00','#3ddc84','#b88cff','#ff6f91'];const i=String(t).split('').reduce((a,c)=>a+c.charCodeAt(0),0)%p.length;return`linear-gradient(145deg,${p[i]},#111827 72%)`}
    function filtered(){const q=search.trim().toLowerCase(),vs=['reading','unread','completed','wishlist'].includes(view)?view:null;return books.filter(b=>(!vs||b.status===vs)&&(filter==='all'||b.status===filter)&&(!q||b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q)))}
    function stats(){const c=s=>books.filter(b=>b.status===s).length;return{total:books.length,reading:c('reading'),completed:c('completed'),unread:c('unread'),wishlist:c('wishlist'),average:books.length?(books.reduce((a,b)=>a+b.rating,0)/books.length).toFixed(1):'0'}}
    function toast(msg){let t=document.querySelector('.toast');if(t)t.remove();t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2600)}
    function sound(){if(!settings.soundEnabled)return;const C=window.AudioContext||window.webkitAudioContext;if(!C)return;const c=new C(),g=c.createGain();g.gain.value=.04;g.connect(c.destination);[523.25,659.25,783.99].forEach((f,i)=>{const o=c.createOscillator();o.frequency.value=f;o.type='sine';o.connect(g);o.start(c.currentTime+i*.08);o.stop(c.currentTime+.18+i*.08)});setTimeout(()=>c.close(),600)}
    function vib(){if(settings.vibrationEnabled&&navigator.vibrate)navigator.vibrate([45,25,45])}
    function party(msg){toast(msg);sound();vib();const ctx=confetti.getContext('2d'),w=confetti.width=innerWidth*devicePixelRatio,h=confetti.height=innerHeight*devicePixelRatio,p=Array.from({length:90},()=>({x:Math.random()*w,y:-20*devicePixelRatio,s:(5+Math.random()*8)*devicePixelRatio,v:(2+Math.random()*5)*devicePixelRatio,d:(Math.random()-.5)*4*devicePixelRatio,c:['#4da6ff','#ff7a00','#3ddc84','#ffb74d','#fff'][Math.floor(Math.random()*5)],r:Math.random()*Math.PI}));let f=0;(function draw(){f++;ctx.clearRect(0,0,w,h);p.forEach(a=>{a.y+=a.v;a.x+=a.d;a.r+=.12;ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.r);ctx.fillStyle=a.c;ctx.fillRect(-a.s/2,-a.s/2,a.s,a.s*.55);ctx.restore()});if(f<120)requestAnimationFrame(draw);else ctx.clearRect(0,0,w,h)})()}
    function setView(v){view=v;filter='all';selected=null;drawer.classList.remove('open');drawerBg.classList.remove('show');render()}
    function renderDrawer(){const st=stats();drawer.innerHTML=`<div class="brand"><div class="mark">BT</div><div><strong>Book Tracker</strong><br><span>${navigator.onLine?'Онлайн':'Оффлайн режим'}</span></div></div><nav>${menu.map(m=>`<button class="${view===m[0]?'active':''}" onclick="setView('${m[0]}')"><span>${m[1]}</span>${m[2]}</button>`).join('')}</nav><div class="drawer-foot"><span>${esc(settings.username)}</span><small>${st.total} книг локально</small></div>`}
    function render(){renderDrawer();title.textContent=(menu.find(m=>m[0]===view)||menu[0])[2];if(!localStorage.getItem('book-tracker-onboarded')&&!books.length&&!selected){root.innerHTML=`<section class="panel onboarding"><span class="pill">Оффлайн PWA</span><h2>Добро пожаловать в вашу личную библиотеку</h2><p>Храните книги, wishlist, прогресс чтения и статистику прямо на устройстве. Без аккаунтов, серверов и лишних шагов.</p><div class="actions"><button class="primary" onclick="openForm('unread')">Добавить первую книгу</button><button class="secondary" onclick="startScanner()">Сканировать ISBN</button></div><div class="choice"><button onclick="startScanner()">📷 Сканировать</button><button onclick="openForm('unread')">✍️ Вручную</button></div></section>`;return}if(view==='stats')return renderStats();if(view==='settings')return renderSettings();renderList()}
    function renderList(){const list=filtered();root.innerHTML=`<section class="controls"><label class="search"><span>🔍</span><input type="search" value="${esc(search)}" placeholder="Поиск по названию или автору" oninput="search=this.value;renderList()"></label><select onchange="filter=this.value;renderList()"><option value="all">Все статусы</option>${Object.entries(statusMap).map(([k,v])=>`<option value="${k}" ${filter===k?'selected':''}>${v.label}</option>`).join('')}</select></section>${list.length?`<section class="grid">${list.map((b,i)=>card(b,i)).join('')}</section>`:`<section class="empty"><div class="empty-icon">📚</div><h2>Здесь пока пусто</h2><p>Добавьте книгу вручную или через ISBN-сканирование.</p><button class="primary" onclick="openForm('${view==='wishlist'?'wishlist':'unread'}')">Добавить книгу</button></section>`}`}
    function card(b,i){const s=statusMap[b.status];return`<button class="book" onclick="openDetail('${b.id}')" style="animation-delay:${Math.min(i*45,500)}ms"><div class="cover" style="background:${b.cover?'#111827':cover(b.title)}">${b.cover?`<img src="${esc(b.cover)}" alt="${esc(b.title)}" loading="lazy">`:`<span>${esc(b.title.slice(0,2).toUpperCase())}</span>`}</div><div class="meta"><strong>${esc(b.title)}</strong><span>${esc(b.author)}</span><div class="bottom"><i style="color:${s.color}">${s.icon} ${s.short}</i><b>${b.rating}/10</b></div></div></button>`}
    function renderStats(){const st=stats(),recent=books.filter(b=>b.status==='completed').slice(0,3);root.innerHTML=`<section class="stats"><div class="stat"><button onclick="setView('all')"><span>${st.total}</span><small>Всего книг</small></button><button onclick="setView('reading')"><span>${st.reading}</span><small>Читаю</small></button><button onclick="setView('completed')"><span>${st.completed}</span><small>Прочитано</small></button><button onclick="setView('unread')"><span>${st.unread}</span><small>Не прочитано</small></button></div><div class="insight"><span class="eyebrow">Средний рейтинг</span><h2>${st.average}/10</h2><p>Wishlist: ${st.wishlist}. Каждая цифра выше открывает нужный список.</p></div><div class="insight"><span class="eyebrow">Последние завершённые</span>${recent.length?recent.map(b=>`<p>${esc(b.title)} · ${b.rating}/10</p>`).join(''):'<p>Здесь появятся завершённые книги.</p>'}</div></section>`}
    function renderSettings(){root.innerHTML=`<section class="settings"><label>Имя пользователя<input value="${esc(settings.username)}" oninput="settings.username=this.value;saveSettings();renderDrawer()"></label><label class="toggle"><span>Звук</span><input type="checkbox" ${settings.soundEnabled?'checked':''} onchange="settings.soundEnabled=this.checked;saveSettings();toast('Настройки сохранены')"></label><label class="toggle"><span>Вибрация</span><input type="checkbox" ${settings.vibrationEnabled?'checked':''} onchange="settings.vibrationEnabled=this.checked;saveSettings();toast('Настройки сохранены')"></label><div class="actions"><button class="primary" onclick="exportJson()">Экспорт JSON</button><button class="secondary" onclick="document.getElementById('importFile').click()">Импорт JSON</button></div><input id="importFile" class="hidden" type="file" accept="application/json" onchange="readImport(this.files[0])"></section>`}
    function openForm(status='unread',id=null){editing=id?books.find(b=>b.id===id):null;form=editing?{title:editing.title,author:editing.author,cover:editing.cover,status:editing.status,rating:editing.rating,description:editing.description,genre:editing.genre,purchaseDate:editing.purchaseDate}:{...empty,status};showForm()}
    function showForm(){modal(`<section class="sheet"><div class="head"><div><span class="eyebrow">${editing?'Редактирование':'Новая книга'}</span><h2>${editing?'Обновить книгу':'Добавить книгу'}</h2></div><button class="icon" onclick="closeModal()">×</button></div><div class="choice"><button onclick="startScanner()">📷 Сканировать ISBN</button><button>✍️ Ввести вручную</button></div><div class="form"><label>Название *<input id="fTitle" value="${esc(form.title)}" placeholder="Например, Дюна"></label><label>Автор *<input id="fAuthor" value="${esc(form.author)}" placeholder="Фрэнк Герберт"></label><label>Ссылка на обложку<input id="fCover" value="${esc(form.cover)}" placeholder="https://..."></label><label>Жанр<input id="fGenre" value="${esc(form.genre)}" placeholder="Фантастика"></label><label>Дата покупки<input id="fDate" type="date" value="${esc(form.purchaseDate)}"></label><label>Статус<select id="fStatus">${Object.entries(statusMap).map(([k,v])=>`<option value="${k}" ${form.status===k?'selected':''}>${v.icon} ${v.label}</option>`).join('')}</select></label><label class="wide">Рейтинг: <span id="ratingText">${form.rating}</span>/10<input id="fRating" type="range" min="1" max="10" value="${form.rating}" oninput="ratingText.textContent=this.value"></label><label class="wide">Описание<textarea id="fDesc" rows="4" placeholder="Короткая заметка о книге">${esc(form.description)}</textarea></label></div><div class="actions sticky"><button class="secondary" onclick="closeModal()">Закрыть</button><button class="primary" onclick="saveCurrent()">${editing?'Сохранить':'Добавить'}</button></div>${lastAdded?`<div class="result"><span>Добавлено</span><strong>${esc(lastAdded.title)}</strong><small>${esc(lastAdded.author)} · ${statusMap[lastAdded.status].label}</small></div>`:''}</section>`)}
    async function saveCurrent(){form={title:fTitle.value,author:fAuthor.value,cover:fCover.value,status:fStatus.value,rating:Number(fRating.value),description:fDesc.value,genre:fGenre.value,purchaseDate:fDate.value};if(!form.title.trim()||!form.author.trim())return toast('Название и автор обязательны');const prev=editing,now=new Date().toISOString(),book={id:prev?.id||uid(),...form,finishedDate:form.status==='completed'?(prev?.finishedDate||now):'',createdAt:prev?.createdAt||now,updatedAt:now};await saveBookObj(book);lastAdded=book;selected=book;editing=null;if(prev?.status==='wishlist'&&book.status!=='wishlist')party('Книга добавлена в библиотеку!');else if(prev?.status!=='completed'&&book.status==='completed')party('Книга завершена!');else toast(prev?'Книга обновлена':'Книга добавлена');showForm();renderDrawer()}
    function openDetail(id){selected=books.find(b=>b.id===id);const b=selected,s=statusMap[b.status];modal(`<article class="sheet detail"><div class="head"><span class="pill" style="border-color:${s.color};color:${s.color}">${s.icon} ${s.label}</span><button class="icon" onclick="closeModal()">×</button></div><div class="bigcover" style="background:${b.cover?'#111827':cover(b.title)}">${b.cover?`<img src="${esc(b.cover)}" alt="${esc(b.title)}">`:`<span>${esc(b.title.slice(0,2).toUpperCase())}</span>`}</div><h2>${esc(b.title)}</h2><p>${esc(b.author)}</p>${b.genre?`<span class="pill">${esc(b.genre)}</span>`:''}${b.description?`<p class="desc">${esc(b.description)}</p>`:''}<div class="quick">${['unread','reading','completed'].map(x=>`<button class="${b.status===x?'active':''}" style="border-color:${statusMap[x].color}" onclick="changeStatus('${b.id}','${x}')">${statusMap[x].icon}</button>`).join('')}</div><div class="stars">${Array.from({length:10},(_,i)=>i+1).map(r=>`<button class="${r<=b.rating?'fill':''}" onclick="rateBook('${b.id}',${r})">★</button>`).join('')}</div><div class="actions"><button class="secondary" onclick="closeModal();openForm('${b.status}','${b.id}')">Редактировать</button><button class="danger" onclick="removeBook('${b.id}')">Удалить</button></div></article>`)}
    async function changeStatus(id,status){const old=books.find(b=>b.id===id),book=norm({...old,status,finishedDate:status==='completed'?(old.finishedDate||new Date().toISOString()):''});await saveBookObj(book);if(old.status==='wishlist'&&status!=='wishlist')party('Книга добавлена в библиотеку!');else if(old.status!=='completed'&&status==='completed')party('Книга завершена!');else toast('Статус обновлён');openDetail(id);render()}
    async function rateBook(id,rating){const old=books.find(b=>b.id===id),book=norm({...old,rating});await saveBookObj(book);openDetail(id);render()}
    async function removeBook(id){const b=books.find(x=>x.id===id);if(!confirm(`Удалить «${b.title}»?`))return;await delBook(id);closeModal();toast('Книга удалена');render()}
    function modal(html){closeModal();const o=document.createElement('section');o.id='modal';o.className='overlay end';o.innerHTML=html;document.body.appendChild(o)}
    function closeModal(){const m=document.getElementById('modal');if(m)m.remove();stopScanner(false)}
    function exportJson(){const blob=new Blob([JSON.stringify({version:1,exportedAt:new Date().toISOString(),settings,books},null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=`book-tracker-export-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);toast('JSON экспортирован')}
    async function readImport(file){if(!file)return;try{const payload=JSON.parse(await file.text()),incoming=(Array.isArray(payload)?payload:payload.books||[]).map(norm);pendingImport=incoming;showImport()}catch{toast('Не удалось прочитать JSON')}}
    function showImport(){modal(`<div class="modal compact"><h2>Импорт JSON</h2><p>Найдено книг: ${pendingImport.length}. Выберите способ импорта и подтвердите действие.</p><div class="seg"><button id="mergeBtn" class="active" onclick="importMode='merge';mergeBtn.classList.add('active');replaceBtn.classList.remove('active')">Объединить</button><button id="replaceBtn" onclick="importMode='replace';replaceBtn.classList.add('active');mergeBtn.classList.remove('active')">Заменить</button></div><div class="actions"><button class="secondary" onclick="closeModal()">Отмена</button><button class="primary" onclick="confirmImport()">Подтвердить</button></div></div>`)}
    async function confirmImport(){const next=importMode==='replace'?pendingImport:[...books.filter(b=>!pendingImport.some(i=>i.id===b.id)),...pendingImport];await replaceBooks(next);closeModal();toast(importMode==='replace'?'Библиотека заменена':'Библиотека объединена');render()}
    async function startScanner(){modal(`<div class="modal scanner"><div class="head"><div><span class="eyebrow">Camera API</span><h2>Сканировать ISBN</h2></div><button class="icon" onclick="closeModal()">×</button></div><video id="video" playsinline muted></video><p>Наведите камеру на штрихкод ISBN. Если камера недоступна, введите номер вручную.</p><div class="manual"><input id="isbn" inputmode="numeric" placeholder="9785171183664"><button class="primary" onclick="applyIsbn(isbn.value)">Найти</button></div></div>`);try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});video.srcObject=stream;await video.play();const B=window.BarcodeDetector;if(B){const detector=new B({formats:['ean_13','ean_8','code_128']});const scan=async()=>{if(!video)return;try{const codes=await detector.detect(video);if(codes[0]?.rawValue)return applyIsbn(codes[0].rawValue)}catch{}scanTimer=setTimeout(scan,650)};scan()}}catch{toast('Камера недоступна, введите ISBN вручную')}}
    function stopScanner(remove=true){if(scanTimer)clearTimeout(scanTimer);if(stream)stream.getTracks().forEach(t=>t.stop());stream=null;if(remove){const m=document.getElementById('modal');if(m)m.remove()}}
    function applyIsbn(v){const clean=String(v).replace(/[^0-9X]/gi,''),found=samples[clean];stopScanner();openForm('unread');if(found){form={...form,...found};toast('ISBN найден, данные заполнены')}else{form={...form,description:form.description||`ISBN: ${clean}`};toast('ISBN сохранён, заполните книгу вручную')}showForm()}
    document.getElementById('openDrawer').onclick=()=>{drawer.classList.add('open');drawerBg.classList.add('show')};drawerBg.onclick=()=>{drawer.classList.remove('open');drawerBg.classList.remove('show')};document.getElementById('addBtn').onclick=()=>openForm(view==='wishlist'?'wishlist':'unread');addEventListener('online',renderDrawer);addEventListener('offline',renderDrawer);
    const manifest={name:'Book Tracker PWA',short_name:'Book Tracker',start_url:'.',display:'standalone',background_color:'#0f1117',theme_color:'#0f1117',lang:'ru',icons:[]};const ml=document.createElement('link');ml.rel='manifest';ml.href='data:application/manifest+json,'+encodeURIComponent(JSON.stringify(manifest));document.head.appendChild(ml);
    load();
  </script>
</body>
